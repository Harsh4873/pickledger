name: Model Cache Freshness Guard

on:
  schedule:
    # Cheap morning stale-cache guard. GitHub schedules can be delayed, so run
    # every 15 minutes and dispatch the heavy refresh only when today's cache is
    # still missing.
    - cron: "12,27,42,57 12-16 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: model-cache-freshness-guard
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check committed cache date
        id: cache
        run: |
          TARGET_DATE="$(TZ=America/Chicago date +%F)"
          CACHE_DATE="$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/model_cache/latest.json")
          try:
              payload = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              payload = {}
          print(str(payload.get("date") or ""))
          PY
          )"
          CACHE_HEALTHY="$(python - <<'PY'
          import json
          from pathlib import Path

          required = {"mlb_new", "mlb_inning", "mlb_first_five", "wnba", "nba", "nba_playoffs", "nba_summer", "fifa_world_cup"}
          try:
              payload = json.loads(Path("data/model_cache/latest.json").read_text(encoding="utf-8"))
          except Exception:
              payload = {}
          models = payload.get("models") if isinstance(payload.get("models"), dict) else {}
          healthy = all(isinstance(models.get(key), dict) and models[key].get("ok") is True for key in required)
          print("true" if healthy else "false")
          PY
          )"
          PLAYER_CACHE_DATE="$(python - <<'PY'
          import json
          from pathlib import Path

          path = Path("data/player_props_cache/latest.json")
          try:
              payload = json.loads(path.read_text(encoding="utf-8"))
          except Exception:
              payload = {}
          print(str(payload.get("date") or ""))
          PY
          )"
          PLAYER_CACHE_HEALTHY="$(python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          required = {
              "nba_player_props",
              "mlb_player_props",
              "wnba_player_props",
          }
          try:
              payload = json.loads(Path("data/player_props_cache/latest.json").read_text(encoding="utf-8"))
          except Exception:
              payload = {}
          models = payload.get("models") if isinstance(payload.get("models"), dict) else {}
          team_models = {}
          try:
              team_payload = json.loads(Path("data/model_cache/latest.json").read_text(encoding="utf-8"))
              team_models = team_payload.get("models") if isinstance(team_payload.get("models"), dict) else {}
          except Exception:
              team_payload = {}
              team_models = {}
          target_date = str(team_payload.get("date") or payload.get("date") or "")

          def central_date(value):
              text = str(value or "").strip()
              if not text:
                  return None
              try:
                  parsed = datetime.fromisoformat(text.replace("Z", "+00:00"))
              except ValueError:
                  return None
              if parsed.tzinfo is None:
                  return parsed.date().isoformat()
              return parsed.astimezone(ZoneInfo("America/Chicago")).date().isoformat()

          def row_matches_target(row):
              if not target_date:
                  return True
              for date_key in ("start_time", "game_start_time", "gameDate", "game_date", "date"):
                  row_date = central_date(row.get(date_key))
                  if row_date is not None:
                      return row_date == target_date
              return True

          def scheduled_games(bucket):
              games = bucket.get("games") if isinstance(bucket, dict) else 0
              if isinstance(games, list):
                  return sum(1 for row in games if isinstance(row, dict) and row_matches_target(row))
              try:
                  return max(0, int(games or 0))
              except (TypeError, ValueError):
                  return 0

          official_mlb_games = max(
              (scheduled_games(team_models.get(key)) for key in ("mlb_new", "mlb_inning", "mlb_first_five")),
              default=0,
          )
          required_ml_fields = {
              "ml_probability",
              "ml_edge",
              "ml_expected_value",
              "ml_model_version",
              "ml_market_family",
              "ml_rank",
              "baseline_projection",
          }

          def valid_ml_pick(pick):
              if not isinstance(pick, dict):
                  return False
              if str(pick.get("scope") or "").strip().lower() != "player":
                  return False
              if pick.get("market_priced") is not True or pick.get("odds") in (None, ""):
                  return False
              if str(pick.get("odds_source") or "").strip() != "posted_market":
                  return False
              if str(pick.get("probability_source") or "").strip() != "player_props_ml_v1":
                  return False
              if any(field not in pick or pick.get(field) in (None, "") for field in required_ml_fields):
                  return False
              if pick.get("carried_forward") or pick.get("preserved_from_prior_refresh"):
                  return False
              if str(pick.get("decision") or "").strip().upper() in {"BET", "LEAN"}:
                  mode = str(pick.get("ml_probability_mode") or "").strip()
                  if not (
                      pick.get("consensus_qualified") is True
                      or pick.get("precision_qualified") is True
                      or mode == "four_model_consensus_gate"
                  ):
                      return False
              return True

          healthy = all(isinstance(models.get(key), dict) and models[key].get("ok") is True for key in required)
          for key in required:
              bucket = models.get(key) if isinstance(models.get(key), dict) else {}
              picks = bucket.get("picks") or []
              games = scheduled_games(bucket)
              if key == "mlb_player_props":
                  games = max(games, official_mlb_games)
              if key in {"mlb_player_props", "wnba_player_props"} and any(
                  not valid_ml_pick(pick) for pick in picks
              ):
                  healthy = False
              if games > 0 and not picks and (
                  key == "mlb_player_props" or bucket.get("abstained") is not True
              ):
                  healthy = False
          print("true" if healthy else "false")
          PY
          )"
          echo "target_date=${TARGET_DATE}" >> "$GITHUB_OUTPUT"
          echo "cache_date=${CACHE_DATE}" >> "$GITHUB_OUTPUT"
          echo "player_cache_date=${PLAYER_CACHE_DATE}" >> "$GITHUB_OUTPUT"
          if [ "$CACHE_DATE" = "$TARGET_DATE" ] && [ "$CACHE_HEALTHY" = "true" ]; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
            echo "Model cache is fresh for ${TARGET_DATE}."
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "Model cache is stale or unhealthy: cache=${CACHE_DATE:-missing}, target=${TARGET_DATE}, healthy=${CACHE_HEALTHY}."
          fi
          if [ "$PLAYER_CACHE_DATE" = "$TARGET_DATE" ] && [ "$PLAYER_CACHE_HEALTHY" = "true" ]; then
            echo "player_fresh=true" >> "$GITHUB_OUTPUT"
            echo "Player-props cache is fresh for ${TARGET_DATE}."
          else
            echo "player_fresh=false" >> "$GITHUB_OUTPUT"
            echo "Player-props cache is stale or unhealthy: cache=${PLAYER_CACHE_DATE:-missing}, target=${TARGET_DATE}, healthy=${PLAYER_CACHE_HEALTHY}."
          fi

      - name: Dispatch model cache refresh if stale
        if: steps.cache.outputs.fresh != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_DATE: ${{ steps.cache.outputs.target_date }}
        run: |
          ACTIVE_RUNS="$(gh run list \
            --workflow model-cache-refresh.yml \
            --branch main \
            --limit 20 \
            --json status \
            --jq '[.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "pending" or .status == "requested")] | length')"
          if [ "${ACTIVE_RUNS:-0}" -gt 0 ]; then
            echo "Model cache refresh already queued or running; not dispatching another one."
            exit 0
          fi
          gh workflow run model-cache-refresh.yml --ref main -f date="$TARGET_DATE"

      - name: Dispatch player-props refresh if stale
        if: steps.cache.outputs.player_fresh != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_DATE: ${{ steps.cache.outputs.target_date }}
        run: |
          DAY_START_UTC="$(python - "$TARGET_DATE" <<'PY'
          from datetime import date, datetime, time, timezone
          import sys
          from zoneinfo import ZoneInfo

          target = date.fromisoformat(sys.argv[1])
          start = datetime.combine(target, time.min, tzinfo=ZoneInfo("America/Chicago"))
          print(start.astimezone(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"))
          PY
          )"
          ACTIVE_RUNS="$(gh run list \
            --workflow player-props-refresh.yml \
            --branch main \
            --limit 20 \
            --json status \
            --jq '[.[] | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "pending" or .status == "requested")] | length')"
          if [ "${ACTIVE_RUNS:-0}" -gt 0 ]; then
            echo "Player-props refresh already queued or running; not dispatching another one."
            exit 0
          fi
          DISPATCHES_TODAY="$(gh run list \
            --workflow player-props-refresh.yml \
            --branch main \
            --limit 100 \
            --json createdAt,displayTitle,event | \
            jq --arg cutoff "$DAY_START_UTC" \
               --arg target_title "Player Props Refresh $TARGET_DATE" \
              '[.[] | select(
                .event == "workflow_dispatch"
                and .createdAt >= $cutoff
                and (.displayTitle == $target_title or .displayTitle == "Player Props Refresh today")
              )] | length')"
          if [ "${DISPATCHES_TODAY:-0}" -gt 0 ]; then
            echo "A manual/guard player-props refresh already ran for ${TARGET_DATE}; the morning automation owns any bounded post-fix rerun."
            exit 0
          fi
          gh workflow run player-props-refresh.yml --ref main -f date="$TARGET_DATE"
