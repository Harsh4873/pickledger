services:
  - type: web
    name: pickledger-grader
    env: python
    plan: starter
    buildCommand: |
      apt-get update && apt-get install -y default-jre-headless
      pip install -r requirements.txt
      pip install -r NBAPredictionModel/requirements.txt
      pip install -r MLBPredictionModel/requirements.txt
      python -m playwright install --with-deps chromium
    startCommand: python pickgrader_server.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
