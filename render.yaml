services:
  - type: web
    name: pickledger-grader
    env: python
    plan: starter
    buildCommand: >-
      pip install -r requirements.txt &&
      pip install -r NBAPredictionModel/requirements.txt &&
      pip install -r MLBPredictionModel/requirements.txt
    startCommand: python pickgrader_server.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
