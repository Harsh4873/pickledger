services:
  - type: web
    name: pickledger-grader
    env: python
    plan: starter
    buildCommand: >-
      pip install -r requirements.txt &&
      pip install -r NBAPredictionModel/requirements.txt &&
      pip install -r MLBPredictionModel/requirements.txt
    startCommand: python pickgrader_server.py
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ENABLE_SCORES24_REMOTE
        value: "true"
      - key: ENABLE_SPORTYTRADER_REMOTE
        value: "true"
      - key: PLAYWRIGHT_PROXY_SERVER
        sync: false
      - key: PLAYWRIGHT_PROXY_USERNAME
        sync: false
      - key: PLAYWRIGHT_PROXY_PASSWORD
        sync: false
